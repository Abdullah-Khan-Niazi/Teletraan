services:
  - type: web
    name: teletraan
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: false
    plan: starter
    healthCheckPath: /health
