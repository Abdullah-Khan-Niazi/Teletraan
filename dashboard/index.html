<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELETRAAN — Command Center</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
</head>
<body>
    <!-- ─── AUTH GATE ───────────────────────────────────────────── -->
    <div id="auth-gate" class="auth-gate">
        <div class="auth-card">
            <div class="auth-logo">
                <svg class="auth-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="24,2 44,14 44,34 24,46 4,34 4,14"/>
                    <polygon points="24,10 36,17 36,31 24,38 12,31 12,17"/>
                    <line x1="24" y1="2" x2="24" y2="10"/>
                    <line x1="44" y1="14" x2="36" y2="17"/>
                    <line x1="44" y1="34" x2="36" y2="31"/>
                    <line x1="24" y1="46" x2="24" y2="38"/>
                    <line x1="4" y1="34" x2="12" y2="31"/>
                    <line x1="4" y1="14" x2="12" y2="17"/>
                </svg>
                <h1>TELETRAAN</h1>
                <p class="auth-subtitle">Command Center</p>
            </div>
            <form id="auth-form">
                <label for="api-key-input">Admin API Key</label>
                <div class="input-group">
                    <input type="password" id="api-key-input" placeholder="Enter your admin key" autocomplete="off" required>
                    <button type="button" id="toggle-key-vis" class="btn-icon" title="Toggle visibility">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Authenticate</button>
                <p id="auth-error" class="error-text" hidden></p>
            </form>
        </div>
    </div>

    <!-- ─── MAIN APP SHELL ──────────────────────────────────────── -->
    <div id="app-shell" class="app-shell" hidden>
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                <svg class="brand-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="24,2 44,14 44,34 24,46 4,34 4,14"/>
                    <polygon points="24,10 36,17 36,31 24,38 12,31 12,17"/>
                    <line x1="24" y1="2" x2="24" y2="10"/>
                    <line x1="44" y1="14" x2="36" y2="17"/>
                    <line x1="44" y1="34" x2="36" y2="31"/>
                    <line x1="24" y1="46" x2="24" y2="38"/>
                    <line x1="4" y1="34" x2="12" y2="31"/>
                    <line x1="4" y1="14" x2="12" y2="17"/>
                </svg>
                <span class="brand-text">TELETRAAN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="overview">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>Overview</span>
                </a>
                <a href="#" class="nav-item" data-page="distributors">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    <span>Distributors</span>
                </a>
                <a href="#" class="nav-item" data-page="orders">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    <span>Orders</span>
                </a>
                <a href="#" class="nav-item" data-page="customers">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Customers</span>
                </a>
                <a href="#" class="nav-item" data-page="payments">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    <span>Payments</span>
                </a>
                <a href="#" class="nav-item" data-page="sessions">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    <span>Sessions</span>
                </a>
                <a href="#" class="nav-item" data-page="analytics">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    <span>Analytics</span>
                </a>
                <a href="#" class="nav-item" data-page="system">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span>System</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-logout" class="btn btn-ghost btn-full">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <button id="btn-sidebar-toggle" class="btn-icon sidebar-toggle">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="topbar-title" id="page-title">Overview</div>
                <div class="topbar-actions">
                    <div class="env-badge" id="env-badge">DEV</div>
                    <div class="connection-dot" id="connection-dot" title="API Connection"></div>
                </div>
            </header>

            <!-- Page Container -->
            <div class="page-container" id="page-container">
                <!-- Pages are rendered here by JS -->
            </div>
        </main>
    </div>

    <!-- ─── TOAST CONTAINER ─────────────────────────────────────── -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ─── MODAL CONTAINER ─────────────────────────────────────── -->
    <div id="modal-overlay" class="modal-overlay" hidden>
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="btn-icon modal-close" id="modal-close">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages/overview.js"></script>
    <script src="js/pages/distributors.js"></script>
    <script src="js/pages/orders.js"></script>
    <script src="js/pages/customers.js"></script>
    <script src="js/pages/payments.js"></script>
    <script src="js/pages/sessions.js"></script>
    <script src="js/pages/analytics.js"></script>
    <script src="js/pages/system.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
